        :root {

        a, button, [role="button"] { cursor: none; }

        .glass {

        }

        }

        .bg-gradient-soft {
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .reel-spinning {
            animation: spin var(--spin-speed, 2s) linear infinite;
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            border-radius: 50%;
        }

        #vintage-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }

        ::-webkit-scrollbar {
            width: 4px;

            background: #050505;

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const JollyCursor = () => {
            const [position, setPosition] = useState({ x: -100, y: -100 });
            const [isPointer, setIsPointer] = useState(false);
            const [isMouseDown, setIsMouseDown] = useState(false);
            const [scrollSpeed, setScrollSpeed] = useState(2);
            const lastScrollY = useRef(0);

            useEffect(() => {
                const handleMove = (e) => {
                    setPosition({ x: e.clientX, y: e.clientY });
                    const target = e.target;
                    setIsPointer(
                        window.getComputedStyle(target).cursor === 'pointer' || 
                        ['A', 'BUTTON', 'INPUT'].includes(target.tagName) ||
                        target.closest('a') || target.closest('button')
                    );
                    if (Math.random() > 0.7) createParticle(e.clientX, e.clientY);
                };

                const handleScroll = () => {
                    const delta = Math.abs(window.scrollY - lastScrollY.current);
                    setScrollSpeed(Math.max(0.1, 2 - (delta / 40)));
                    lastScrollY.current = window.scrollY;
                    setTimeout(() => setScrollSpeed(2), 150);
                };

                const createParticle = (x, y) => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const size = Math.random() * 3 + 1;
                    p.style.width = `${size}px`;
                    p.style.height = `${size}px`;
                    p.style.left = `${x}px`;
                    p.style.top = `${y}px`;
                    p.style.background = Math.random() > 0.5 ? '#3b82f6' : '#ffffff';
                    document.body.appendChild(p);
                    p.animate([
                        { transform: 'translate(0,0) scale(1)', opacity: 0.6 },
                        { transform: `translate(${(Math.random()-0.5)*40}px, ${(Math.random()-0.5)*40}px) scale(0)`, opacity: 0 }
                    ], { duration: 600 }).onfinish = () => p.remove();
                };

                window.addEventListener('mousemove', handleMove);
                window.addEventListener('scroll', handleScroll);
                window.addEventListener('mousedown', () => setIsMouseDown(true));
                window.addEventListener('mouseup', () => setIsMouseDown(false));
                
                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('scroll', handleScroll);
                };
            }, []);

            return (
                <div id="vintage-cursor" style={{ 
                    transform: `translate(${position.x - 30}px, ${position.y - 30}px) scale(${isMouseDown ? 0.8 : (isPointer ? 1.3 : 1)})`,
                    '--spin-speed': `${scrollSpeed}s`
                }}>
                    <svg viewBox="0 0 100 100" className="w-full h-full fill-white drop-shadow-[0_0_8px_rgba(59,130,246,0.4)]">
                        <rect x="25" y="45" width="45" height="30" rx="3" />
                        <path d="M70 50 L85 40 L85 80 L70 70 Z" />
                        <g className="reel-spinning" style={{ transformOrigin: '38px 32px' }}>
                            <circle cx="38" cy="32" r="16" fill="none" stroke="white" strokeWidth="2" strokeDasharray="4 2" />
                            <circle cx="38" cy="32" r="3" />
                        </g>
                        <g className="reel-spinning" style={{ transformOrigin: '62px 36px' }}>
                            <circle cx="62" cy="36" r="12" fill="none" stroke="white" strokeWidth="2" strokeDasharray="3 2" />
                            <circle cx="62" cy="36" r="2" />
                        </g>
                    </svg>
                </div>
            );
        };

                                        View Reel Mastery <i data-lucide="arrow-right" className="w-5 h-5"></i>

                                            { src: "IMG_3544.jpg", alt: "Client 1" },

                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
