<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gopal Bajpai | Cinematic Video Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --brand-blue: #3b82f6;
            --brand-purple: #8b5cf6;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: #ffffff;
            overflow-x: hidden;
            cursor: none; 
        }

        a, button, [role="button"] { cursor: none; }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px); 
        }

        .text-gradient { 
            background: linear-gradient(135deg, #60a5fa, #a78bfa); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .bg-gradient-soft {
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .reel-spinning {
            animation: spin var(--spin-speed, 2s) linear infinite;
        }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            border-radius: 50%;
        }

        #vintage-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .project-card:hover .project-image {
            transform: scale(1.05);
        }

        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const JollyCursor = () => {
            const [position, setPosition] = useState({ x: -100, y: -100 });
            const [isPointer, setIsPointer] = useState(false);
            const [isMouseDown, setIsMouseDown] = useState(false);
            const [scrollSpeed, setScrollSpeed] = useState(2);
            const lastScrollY = useRef(0);

            useEffect(() => {
                const handleMove = (e) => {
                    setPosition({ x: e.clientX, y: e.clientY });
                    const target = e.target;
                    setIsPointer(
                        window.getComputedStyle(target).cursor === 'pointer' || 
                        ['A', 'BUTTON', 'INPUT'].includes(target.tagName) ||
                        target.closest('a') || target.closest('button')
                    );
                    if (Math.random() > 0.7) createParticle(e.clientX, e.clientY);
                };

                const handleScroll = () => {
                    const delta = Math.abs(window.scrollY - lastScrollY.current);
                    setScrollSpeed(Math.max(0.1, 2 - (delta / 40)));
                    lastScrollY.current = window.scrollY;
                    setTimeout(() => setScrollSpeed(2), 150);
                };

                const createParticle = (x, y) => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const size = Math.random() * 3 + 1;
                    p.style.width = `${size}px`;
                    p.style.height = `${size}px`;
                    p.style.left = `${x}px`;
                    p.style.top = `${y}px`;
                    p.style.background = Math.random() > 0.5 ? '#3b82f6' : '#ffffff';
                    document.body.appendChild(p);
                    p.animate([
                        { transform: 'translate(0,0) scale(1)', opacity: 0.6 },
                        { transform: `translate(${(Math.random()-0.5)*40}px, ${(Math.random()-0.5)*40}px) scale(0)`, opacity: 0 }
                    ], { duration: 600 }).onfinish = () => p.remove();
                };

                window.addEventListener('mousemove', handleMove);
                window.addEventListener('scroll', handleScroll);
                window.addEventListener('mousedown', () => setIsMouseDown(true));
                window.addEventListener('mouseup', () => setIsMouseDown(false));
                
                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('scroll', handleScroll);
                };
            }, []);

            return (
                <div id="vintage-cursor" style={{ 
                    transform: `translate(${position.x - 30}px, ${position.y - 30}px) scale(${isMouseDown ? 0.8 : (isPointer ? 1.3 : 1)})`,
                    '--spin-speed': `${scrollSpeed}s`
                }}>
                    <svg viewBox="0 0 100 100" className="w-full h-full fill-white drop-shadow-[0_0_8px_rgba(59,130,246,0.4)]">
                        <rect x="25" y="45" width="45" height="30" rx="3" />
                        <path d="M70 50 L85 40 L85 80 L70 70 Z" />
                        <g className="reel-spinning" style={{ transformOrigin: '38px 32px' }}>
                            <circle cx="38" cy="32" r="16" fill="none" stroke="white" strokeWidth="2" strokeDasharray="4 2" />
                            <circle cx="38" cy="32" r="3" />
                        </g>
                        <g className="reel-spinning" style={{ transformOrigin: '62px 36px' }}>
                            <circle cx="62" cy="36" r="12" fill="none" stroke="white" strokeWidth="2" strokeDasharray="3 2" />
                            <circle cx="62" cy="36" r="2" />
                        </g>
                    </svg>
                </div>
            );
        };

        const Nav = ({ scrolled }) => (
            <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'py-4 bg-[#050505]/80 backdrop-blur-xl border-b border-white/5' : 'py-8 bg-transparent'}`}>
                <div className="max-w-7xl mx-auto px-8 flex justify-between items-center">
                    <div className="group">
                        <span className="text-sm font-black tracking-[0.3em] uppercase group-hover:text-blue-500 transition-colors">Gopal Bajpai</span>
                    </div>
                    <div className="hidden md:flex items-center gap-10 text-[13px] font-semibold uppercase tracking-widest text-gray-400">
                        <a href="#work" className="hover:text-white transition-colors">Projects</a>
                        <a href="#about" className="hover:text-white transition-colors">About</a>
                        <a href="#clients" className="hover:text-white transition-colors">Experience</a>
                        <a href="https://wa.me/919997036033" className="px-6 py-2.5 bg-white text-black rounded-full hover:bg-blue-500 hover:text-white transition-all transform hover:-translate-y-0.5">Let's Collaborate</a>
                    </div>
                </div>
            </nav>
        );

        const ProjectCard = ({ title, category, image, delay }) => (
            <div className={`reveal project-card group relative aspect-video rounded-3xl overflow-hidden glass transition-all duration-700 delay-${delay}`}>
                <div className="absolute inset-0 bg-black/40 group-hover:bg-black/10 transition-all duration-500 z-10" />
                <img 
                    src={image || `https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?auto=format&fit=crop&q=80&w=800`} 
                    alt={title} 
                    className="project-image w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" 
                />
                <div className="absolute bottom-0 left-0 p-8 z-20 translate-y-4 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-500">
                    <p className="text-xs font-bold uppercase tracking-widest text-blue-400 mb-2">{category}</p>
                    <h3 className="text-2xl font-black">{title}</h3>
                </div>
            </div>
        );

        const App = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                    
                    const reveals = document.querySelectorAll('.reveal');
                    reveals.forEach(el => {
                        const rect = el.getBoundingClientRect();
                        if (rect.top < window.innerHeight * 0.9) el.classList.add('visible');
                    });
                };
                
                window.addEventListener('scroll', handleScroll);
                handleScroll(); // Initial check
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const stats = [
                { label: "Projects Completed", value: "150+" },
                { label: "Global Clients", value: "12+" },
                { label: "Years Experience", value: "03+" }
            ];

            const tools = ["Premiere Pro", "After Effects", "DaVinci Resolve", "Photoshop", "CapCut Pro"];

            return (
                <div className="selection:bg-blue-500/30">
                    <JollyCursor />
                    <Nav scrolled={scrolled} />

                    {/* Hero Section */}
                    <section className="relative min-h-screen flex items-center pt-20 overflow-hidden">
                        <div className="absolute top-1/4 -left-20 w-96 h-96 bg-blue-600/10 blur-[120px] rounded-full" />
                        <div className="absolute bottom-1/4 -right-20 w-96 h-96 bg-purple-600/10 blur-[120px] rounded-full" />
                        
                        <div className="max-w-7xl mx-auto px-8 w-full grid lg:grid-cols-2 gap-16 items-center">
                            <div className="reveal visible">
                                <div className="inline-block px-4 py-1.5 rounded-full border border-blue-500/30 bg-blue-500/5 text-blue-400 text-xs font-bold uppercase tracking-widest mb-8">
                                    Available for freelance
                                </div>
                                <h1 className="text-7xl md:text-8xl lg:text-9xl font-black leading-[0.85] tracking-tighter mb-8">
                                    CRAFTING <br />
                                    <span className="text-gradient">STORIES.</span>
                                </h1>
                                <p className="text-xl text-gray-400 max-w-lg mb-10 leading-relaxed font-medium">
                                    I am <span className="text-white">Gopal Bajpai</span>, a specialized video editor dedicated to turning complex narratives into cinematic reality.
                                </p>
                                <div className="flex flex-wrap gap-5">
                                    <a href="#work" className="px-10 py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold transition-all shadow-lg shadow-blue-600/20 flex items-center gap-3">
                                        View Portfolio <i data-lucide="arrow-right" className="w-5 h-5"></i>
                                    </a>
                                    <div className="flex -space-x-3 items-center">
                                        {[1,2,3,4].map(i => (
                                            <div key={i} className="w-10 h-10 rounded-full border-2 border-[#050505] bg-gray-800 overflow-hidden">
                                                <img src={`https://i.pravatar.cc/100?img=${i+10}`} alt="client" />
                                            </div>
                                        ))}
                                        <span className="pl-6 text-sm text-gray-400 font-bold">Trusted by 50+ Creators</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="relative reveal visible delay-300">
                                <div className="aspect-[4/5] rounded-[2.5rem] overflow-hidden border border-white/10 glass p-4 relative group">
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent z-10" />
                                    <img 
                                        src="profile.jpeg" 
                                        alt="Gopal" 
                                        className="w-full h-full object-cover rounded-[2rem] grayscale group-hover:grayscale-0 transition-all duration-1000"
                                        onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=800'; }}
                                    />
                                    <div className="absolute bottom-10 left-10 z-20">
                                        <div className="flex items-center gap-4 bg-black/60 backdrop-blur-md p-4 rounded-2xl border border-white/10">
                                            <div className="w-3 h-3 bg-green-500 rounded-full animate-pulse" />
                                            <div>
                                                <p className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Now Editing</p>
                                                <p className="text-sm font-bold">High-Retention Reels</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Stats */}
                    <section className="py-20 border-y border-white/5 bg-white/[0.01]">
                        <div className="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
                            {stats.map((stat, i) => (
                                <div key={i} className="reveal">
                                    <h3 className="text-5xl font-black mb-2">{stat.value}</h3>
                                    <p className="text-gray-500 uppercase tracking-widest text-xs font-bold">{stat.label}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Projects Section */}
                    <section id="work" className="py-32">
                        <div className="max-w-7xl mx-auto px-8">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-20 gap-8">
                                <div className="reveal">
                                    <h2 className="text-5xl md:text-6xl font-black mb-6">SELECTED <br/><span className="text-gradient">WORKS.</span></h2>
                                    <p className="text-gray-400 max-w-md">A showcase of commercial projects, high-energy edits, and cinematic storytelling.</p>
                                </div>
                                <div className="flex gap-4 reveal">
                                    <button className="px-6 py-3 rounded-full border border-white/10 hover:border-white/40 transition-colors text-sm font-bold">Showreel 2024</button>
                                </div>
                            </div>

                            <div className="grid md:grid-cols-2 gap-8">
                                <ProjectCard title="Rapyd Launch Promo" category="Startup Marketing" delay="0" />
                                <ProjectCard title="Cinematic Wedding Recap" category="Event Highlights" delay="100" />
                                <ProjectCard title="Educational Series" category="SPS Global School" delay="200" />
                                <ProjectCard title="Brand Storytelling" category="Corporate Identity" delay="300" />
                            </div>
                        </div>
                    </section>

                    {/* Skills & Tools */}
                    <section className="py-32 bg-gradient-soft">
                        <div className="max-w-7xl mx-auto px-8">
                            <div className="grid lg:grid-cols-2 gap-20 items-center">
                                <div className="reveal">
                                    <h2 className="text-5xl font-black mb-8 leading-tight">THE POWER <br/>BEHIND THE <span className="text-blue-500">CUT.</span></h2>
                                    <p className="text-gray-400 text-lg mb-12 leading-relaxed">
                                        I utilize the industry's most powerful tools to ensure every frame is polished, every transition is purposeful, and every color is calibrated for maximum impact.
                                    </p>
                                    <div className="flex flex-wrap gap-4">
                                        {tools.map((tool, i) => (
                                            <span key={i} className="px-6 py-3 rounded-xl glass text-sm font-bold text-gray-300">{tool}</span>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-6 reveal">
                                    <div className="space-y-6">
                                        <div className="p-8 rounded-3xl glass border-t border-blue-500/20">
                                            <i data-lucide="zap" className="text-blue-500 w-10 h-10 mb-6"></i>
                                            <h4 className="text-xl font-bold mb-2">High Retention</h4>
                                            <p className="text-sm text-gray-500">Editing specifically designed for social media algorithms.</p>
                                        </div>
                                        <div className="p-8 rounded-3xl glass">
                                            <i data-lucide="layers" className="text-purple-500 w-10 h-10 mb-6"></i>
                                            <h4 className="text-xl font-bold mb-2">Color Grading</h4>
                                            <p className="text-sm text-gray-500">Professional cinematic looks tailored to your brand mood.</p>
                                        </div>
                                    </div>
                                    <div className="space-y-6 mt-12">
                                        <div className="p-8 rounded-3xl glass">
                                            <i data-lucide="music" className="text-pink-500 w-10 h-10 mb-6"></i>
                                            <h4 className="text-xl font-bold mb-2">Sound Design</h4>
                                            <p className="text-sm text-gray-500">Deep atmospheric soundscapes and rhythmic beat-matching.</p>
                                        </div>
                                        <div className="p-8 rounded-3xl glass border-t border-green-500/20">
                                            <i data-lucide="video" className="text-green-500 w-10 h-10 mb-6"></i>
                                            <h4 className="text-xl font-bold mb-2">4K Delivery</h4>
                                            <p className="text-sm text-gray-500">Highest quality export standards for all digital platforms.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer / CTA */}
                    <footer className="pt-32 pb-16 bg-black">
                        <div className="max-w-7xl mx-auto px-8">
                            <div className="reveal text-center mb-32">
                                <h2 className="text-6xl md:text-8xl font-black mb-12 leading-[0.9] tracking-tighter">
                                    LET'S BUILD <br/>YOUR <span className="text-blue-500">LEGACY.</span>
                                </h2>
                                <a href="https://wa.me/919997036033" className="inline-flex items-center gap-4 text-2xl md:text-4xl font-bold hover:text-blue-500 transition-all group">
                                    hello@gopalbajpai.com 
                                    <i data-lucide="arrow-up-right" className="w-10 h-10 group-hover:translate-x-2 group-hover:-translate-y-2 transition-transform"></i>
                                </a>
                            </div>

                            <div className="flex flex-col md:flex-row justify-between items-center pt-16 border-t border-white/5 gap-8">
                                <div className="text-center md:text-left">
                                    <p className="text-xs font-black uppercase tracking-[0.5em] text-gray-600 mb-2">Based in Jaswantnagar, IN</p>
                                    <p className="text-lg font-bold">Gopal Bajpai &copy; 2024</p>
                                </div>
                                <div className="flex gap-8">
                                    <a href="https://www.instagram.com/avg.g0pal" className="text-gray-500 hover:text-white transition-colors"><i data-lucide="instagram" className="w-6 h-6"></i></a>
                                    <a href="https://wa.me/919997036033" className="text-gray-500 hover:text-white transition-colors"><i data-lucide="message-circle" className="w-6 h-6"></i></a>
                                    <a href="#" className="text-gray-500 hover:text-white transition-colors"><i data-lucide="linkedin" className="w-6 h-6"></i></a>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons after React render
        setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
