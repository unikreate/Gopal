<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gopal | Video Editor Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .text-gradient { background: linear-gradient(to right, #3b82f6, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component to handle Lucide in CDN
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                if (window.lucide) window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const clients = [
                {
                    name: "SPS Global School",
                    link: "https://www.instagram.com/sps_global_school",
                    type: "Educational Content",
                    description: "Produced high-quality promotional and event coverage videos."
                },
                {
                    name: "WebWrite Services",
                    link: "https://www.instagram.com/webwriteservices",
                    type: "Corporate & Digital",
                    description: "Edited professional service showcases and brand storytelling clips."
                }
            ];

            const services = [
                { title: "Commercial Ads", icon: "monitor" },
                { title: "Social Media Reels", icon: "video" },
                { title: "Cinematic Editing", icon: "film" },
                { title: "Color Grading", icon: "award" }
            ];

            return (
                <div className="min-h-screen text-white selection:bg-blue-500/30">
                    {/* Navigation */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'bg-[#0a0a0a]/80 backdrop-blur-md py-4 border-b border-white/10' : 'bg-transparent py-6'}`}>
                        <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
                            <div className="text-xl font-black tracking-tighter flex items-center gap-2">
                                <span className="bg-blue-600 px-2 py-1 rounded">G</span>
                                <span>GOPAL.EDITS</span>
                            </div>
                            <div className="hidden md:flex gap-8 text-sm font-medium text-gray-400">
                                <a href="#work" className="hover:text-white transition-colors">Work</a>
                                <a href="#clients" className="hover:text-white transition-colors">Clients</a>
                                <a href="https://www.instagram.com/avg.g0pal" target="_blank" className="hover:text-white transition-colors">Instagram</a>
                            </div>
                            <a href="mailto:contact@gopal.com" className="bg-white text-black px-5 py-2 rounded-full text-sm font-bold hover:bg-blue-600 hover:text-white transition-all transform hover:scale-105">
                                Let's Talk
                            </a>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative pt-32 pb-20 overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full pointer-events-none">
                            <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 blur-[120px] rounded-full"></div>
                            <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/10 blur-[120px] rounded-full"></div>
                        </div>

                        <div className="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
                            <div className="relative z-10">
                                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-xs font-semibold text-blue-400 mb-6">
                                    <span className="relative flex h-2 w-2">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                                    </span>
                                    Available for new projects
                                </div>
                                <h1 className="text-6xl md:text-8xl font-black tracking-tight mb-6 leading-[0.9]">
                                    Visual <br />
                                    <span className="text-gradient italic">Storyteller.</span>
                                </h1>
                                <p className="text-gray-400 text-lg md:text-xl max-w-md mb-8 leading-relaxed">
                                    I turn raw footage into cinematic experiences. Expert in pacing, color, and high-retention editing.
                                </p>
                                <div className="flex flex-wrap gap-4">
                                    <a href="#work" className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-bold transition-all flex items-center gap-2 group">
                                        View Showreel <Icon name="play" className="w-4 h-4 fill-current group-hover:translate-x-1 transition-transform" />
                                    </a>
                                    <a href="https://www.instagram.com/avg.g0pal" target="_blank" className="bg-white/5 hover:bg-white/10 border border-white/10 text-white px-8 py-4 rounded-xl font-bold transition-all flex items-center gap-2">
                                        <Icon name="instagram" className="w-5 h-5" /> Follow Me
                                    </a>
                                </div>
                            </div>

                            <div className="relative">
                                <div className="relative aspect-[4/5] rounded-3xl overflow-hidden border-2 border-white/10 shadow-2xl group">
                                    <img 
                                        src="profile.jpg" 
                                        alt="Gopal - Video Editor"
                                        className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700"
                                        onError={(e) => {
                                            e.target.src = "https://images.unsplash.com/photo-1594909122845-11baa439b7bf?auto=format&fit=crop&q=80&w=1000";
                                        }}
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent opacity-60"></div>
                                    <div className="absolute bottom-6 left-6 right-6 p-6 glass-card rounded-2xl">
                                        <p className="text-sm font-bold text-white uppercase tracking-widest mb-1">Gopal</p>
                                        <p className="text-xs text-gray-400">Professional Video Editor</p>
                                    </div>
                                </div>
                                <div className="absolute -right-8 top-12 bg-blue-600 p-4 rounded-2xl shadow-xl hidden lg:block transform rotate-6">
                                    <div className="text-2xl font-bold">50+</div>
                                    <div className="text-[10px] uppercase tracking-tighter opacity-80">Projects Completed</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Services Grid */}
                    <section className="py-20 border-y border-white/5">
                        <div className="max-w-6xl mx-auto px-6">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                                {services.map((service, i) => (
                                    <div key={i} className="flex flex-col items-center text-center group">
                                        <div className="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-blue-600/20 group-hover:text-blue-500 transition-all duration-300">
                                            <Icon name={service.icon} />
                                        </div>
                                        <h3 className="font-bold text-sm tracking-wide">{service.title}</h3>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Clients Section */}
                    <section id="clients" className="py-32 relative">
                        <div className="max-w-6xl mx-auto px-6">
                            <div className="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-6">
                                <div>
                                    <h2 className="text-4xl font-black mb-4">Trusted By.</h2>
                                    <p className="text-gray-400">Collaborating with schools and digital agencies to deliver quality content.</p>
                                </div>
                                <div className="h-px flex-1 bg-white/10 mx-10 hidden md:block mb-5"></div>
                            </div>

                            <div className="grid md:grid-cols-2 gap-8">
                                {clients.map((client, i) => (
                                    <a 
                                        key={i} 
                                        href={client.link} 
                                        target="_blank" 
                                        className="group p-8 rounded-3xl bg-white/5 border border-white/10 hover:border-blue-500/50 hover:bg-white/10 transition-all"
                                    >
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="bg-blue-600/20 text-blue-400 text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full">
                                                {client.type}
                                            </div>
                                            <Icon name="external-link" className="w-5 h-5 text-gray-500 group-hover:text-blue-400 transition-colors" />
                                        </div>
                                        <h3 className="text-2xl font-bold mb-3 group-hover:text-blue-400 transition-colors">{client.name}</h3>
                                        <p className="text-gray-400 text-sm leading-relaxed">{client.description}</p>
                                        <div className="mt-6 flex items-center gap-2 text-xs font-bold text-white group-hover:translate-x-2 transition-transform">
                                            VIEW ON INSTAGRAM <Icon name="chevron-right" className="w-3 h-3" />
                                        </div>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Showcase Grid */}
                    <section id="work" className="py-32 bg-white/[0.02]">
                        <div className="max-w-6xl mx-auto px-6">
                            <h2 className="text-4xl font-black mb-16 text-center">Featured Work.</h2>
                            <div className="grid md:grid-cols-3 gap-6">
                                {[1, 2, 3].map((item) => (
                                    <div key={item} className="group relative aspect-video bg-white/5 rounded-2xl overflow-hidden border border-white/10">
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <div className="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center transform scale-0 group-hover:scale-100 transition-transform duration-300">
                                                <Icon name="play" className="w-5 h-5 fill-current" />
                                            </div>
                                        </div>
                                        <div className="w-full h-full bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center">
                                            <span className="text-gray-600 font-mono text-xs italic">Video Portfolio {item}</span>
                                        </div>
                                        <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                                            <p className="text-xs font-bold uppercase tracking-widest">Cinema Edit</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-16 text-center">
                                <p className="text-gray-500 text-sm italic mb-8">Want to see more? Check my Instagram feed.</p>
                                <a href="https://www.instagram.com/avg.g0pal" target="_blank" className="inline-flex items-center gap-2 text-blue-500 font-bold hover:underline">
                                    Explore Full Catalog <Icon name="chevron-right" className="w-4 h-4" />
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-20 border-t border-white/10 relative overflow-hidden">
                        <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-12">
                            <div>
                                <h2 className="text-4xl font-black mb-6">Let's create something <br/><span className="text-blue-500">unforgettable.</span></h2>
                                <div className="flex gap-6">
                                    <a href="https://www.instagram.com/avg.g0pal" className="text-gray-400 hover:text-white transition-colors"><Icon name="instagram" /></a>
                                    <a href="mailto:contact@gopal.com" className="text-gray-400 hover:text-white transition-colors"><Icon name="mail" /></a>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-gray-500 text-sm mb-2 font-medium uppercase tracking-widest">Based in India</p>
                                <p className="text-2xl font-bold text-white">GOPAL &copy; 2026</p>
                            </div>
                        </div>
                        <div className="absolute -bottom-20 left-0 w-full text-center text-[15vw] font-black text-white/[0.02] leading-none select-none pointer-events-none uppercase">
                            Creative
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
